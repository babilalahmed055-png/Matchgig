name: MatchGig Android Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type (all, debug, release)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - debug
          - release

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci || npm install

      - name: Build Web Application
        run: |
          npm run build

      - name: Sync Capacitor Android Project
        run: |
          npx cap sync android

      - name: Configure Firebase Support (google-services.json)
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          GOOGLE_SERVICES_JSON_PLAIN: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "Decoding google-services.json from base64 secret..."
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json
          elif [ -n "$GOOGLE_SERVICES_JSON_PLAIN" ]; then
            echo "Writing custom google-services.json from plain secret..."
            echo "$GOOGLE_SERVICES_JSON_PLAIN" > android/app/google-services.json
          else
            echo "No google-services.json secret detected. Build will compile without platform-specific configurations unless pre-packaged."
          fi

      - name: Check for Signing Secrets
        id: check_secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
            echo "Signing secrets are configured."
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "Signing secrets are not configured. Release builds will be skipped."
          fi

      - name: Repair and Validate Gradle Wrapper
        run: |
          echo "Ensuring pristine, uncorrupted gradle-wrapper.jar exists..."
          mkdir -p android/gradle/wrapper
          curl -sSLo android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.14.3/gradle/wrapper/gradle-wrapper.jar || \
          curl -sSLo android/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.10.0/gradle/wrapper/gradle-wrapper.jar
          chmod +x android/gradlew

      - name: Build Debug APK
        if: github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'debug' || github.event_name == 'push' || github.event_name == 'pull_request'
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Build Release APK & AAB
        if: github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'release' || github.event_name == 'push' || github.event_name == 'pull_request'
        run: |
          cd android
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      # Signing step for Release APK (Manual zipalign + apksigner)
      - name: Sign Release APK
        if: steps.check_secrets.outputs.has_secrets == 'true' && (github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'release' || github.event_name == 'push')
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          ZIPALIGN=$(find $ANDROID_HOME/build-tools -name zipalign | sort -V | tail -n 1)
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -n 1)
          
          # Align APK
          $ZIPALIGN -v 4 android/app/build/outputs/apk/release/app-release-unsigned.apk android/app/build/outputs/apk/release/app-release-aligned.apk
          
          # Sign APK
          $APKSIGNER sign --ks android/app/release.keystore --ks-key-alias "$KEY_ALIAS" --ks-pass pass:"$KEYSTORE_PASSWORD" --key-pass pass:"$KEY_PASSWORD" --out android/app/build/outputs/apk/release/app-release-signed.apk android/app/build/outputs/apk/release/app-release-aligned.apk
          
          # Verify APK
          $APKSIGNER verify android/app/build/outputs/apk/release/app-release-signed.apk

      # Signing step for Release AAB (Manual jarsigner)
      - name: Sign Release AAB
        if: steps.check_secrets.outputs.has_secrets == 'true' && (github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'release' || github.event_name == 'push')
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ ! -f android/app/release.keystore ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          fi
          
          # Sign AAB using jarsigner (preinstalled with JDK)
          jarsigner -keystore android/app/release.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            android/app/build/outputs/bundle/release/app-release-unsigned.aab \
            "$KEY_ALIAS"
          
          # Copy to final output mapping
          cp android/app/build/outputs/bundle/release/app-release-unsigned.aab android/app/build/outputs/bundle/release/app-release-signed.aab

      # Artifact Uploads

      - name: Upload Debug APK Artifact
        if: github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'debug' || github.event_name == 'push' || github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: MatchGig-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload Unsigned Release APK Artifact
        if: steps.check_secrets.outputs.has_secrets == 'false' && (github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'release' || github.event_name == 'push' || github.event_name == 'pull_request')
        uses: actions/upload-artifact@v4
        with:
          name: MatchGig-Unsigned-Release-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 7

      - name: Upload Signed Release APK Artifact
        if: steps.check_secrets.outputs.has_secrets == 'true' && (github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'release' || github.event_name == 'push')
        uses: actions/upload-artifact@v4
        with:
          name: MatchGig-Signed-Release-APK
          path: android/app/build/outputs/apk/release/app-release-signed.apk
          retention-days: 30

      - name: Upload Unsigned Release AAB Artifact
        if: steps.check_secrets.outputs.has_secrets == 'false' && (github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'release' || github.event_name == 'push' || github.event_name == 'pull_request')
        uses: actions/upload-artifact@v4
        with:
          name: MatchGig-Unsigned-Release-AAB
          path: android/app/build/outputs/bundle/release/app-release-unsigned.aab
          retention-days: 7

      - name: Upload Signed Release AAB Artifact
        if: steps.check_secrets.outputs.has_secrets == 'true' && (github.event.inputs.build_type == 'all' || github.event.inputs.build_type == 'release' || github.event_name == 'push')
        uses: actions/upload-artifact@v4
        with:
          name: MatchGig-Signed-Release-AAB
          path: android/app/build/outputs/bundle/release/app-release-signed.aab
          retention-days: 30
